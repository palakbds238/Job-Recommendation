{% extends "base.html" %}
{% block title %}Login — CareerAI{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">⚡</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your CareerAI account</p>
    </div>
    <form method="POST" action="{{ url_for('login') }}" class="auth-form">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Your password" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Sign In →</button>
    </form>
    <div class="auth-footer">
      <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
      <div class="auth-demo">
        <strong>Demo Admin:</strong> admin@jobrec.com / admin123
      </div>
    </div>
  </div>
</div>
{% endblock %}

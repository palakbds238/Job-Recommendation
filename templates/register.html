{% extends "base.html" %}
{% block title %}Register — CareerAI{% endblock %}
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">⚡</div>
      <h2>Create Account</h2>
      <p>Join CareerAI and get AI-powered job matches</p>
    </div>
    <form method="POST" action="{{ url_for('register') }}" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="e.g. Priya Sharma">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Minimum 6 characters" minlength="6">
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account →</button>
    </form>
    <div class="auth-footer">
      <p>Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </div>
  </div>
</div>
{% endblock %}
